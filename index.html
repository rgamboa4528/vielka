<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flor Amarilla</title>

<style>
body {
    background-color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: cursive;
}

/* Tarjeta */
.card {
    background: #fdf6e3;
    padding: 35px;
    border-radius: 25px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: aparecer 1.5s ease;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.9);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* Botón */
.btn {
    padding: 10px 20px;
    border: none;
    background: #d4af37;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 16px;
    margin-bottom: 15px;
}

.btn:hover {
    background: #b8962e;
}

/* Contenido oculto */
.contenido {
    opacity: 0;
    transform: scale(0.8);
    transition: 0.8s ease;
}

.contenido.mostrar {
    opacity: 1;
    transform: scale(1);
}

/* Texto */
.texto {
    font-size: 20px;
    margin-bottom: 20px;
}

/* Flor */
.flor {
    position: relative;
    width: 150px;
    height: 150px;
    margin: auto;
}

.petalo {
    width: 30px;
    height: 60px;
    background: linear-gradient(#FFD54F, #FFC107);
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: center bottom;
}

.centro {
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #6d4c41, #3e2723);
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Tallo */
.tallo {
    width: 6px;
    height: 140px;
    background: linear-gradient(to bottom, #2e7d32, #1b5e20);
    margin: auto;
    margin-top: -20px;
}
</style>

<script>
function mostrar() {
    document.getElementById("contenido").classList.add("mostrar");
    document.querySelector(".btn").style.display = "none";
}
</script>

</head>
<body>

<div class="card">

    <button class="btn" onclick="mostrar()">Abrir 💌</button>

    <div class="contenido" id="contenido">
        <div class="texto">ME ENCANTAS ❤️ </div>

        <div class="flor">
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(0deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(30deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(60deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(90deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(120deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(150deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(180deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(210deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(240deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(270deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(300deg);"></div>
            <div class="petalo" style="transform: translate(-50%, -100%) rotate(330deg);"></div>

            <div class="centro"></div>
        </div>

        <div class="tallo"></div>
    </div>

</div>

</body>
</html>
